<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archivio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0f11;--surface:#18181c;--surface2:#222228;--border:#2e2e38;--border2:#3d3d4a;--accent:#7c6bff;--accent2:#a99bff;--accent-dim:rgba(124,107,255,0.12);--text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;--green:#4ade80;--green-bg:rgba(74,222,128,0.1);--red:#f87171;--red-bg:rgba(248,113,113,0.1);--radius:10px;--radius-lg:14px;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
  .app{display:flex;min-height:100vh}
  .sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
  .main{flex:1;overflow:hidden;display:flex;flex-direction:column}
  .sidebar-header{padding:24px 20px;border-bottom:1px solid var(--border)}
  .logo{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .logo-icon{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
  .logo-text{font-size:16px;font-weight:600;letter-spacing:-0.02em}
  .logo-sub{font-size:11px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em}
  .status-row{display:flex;align-items:center;gap:6px;margin-top:12px;font-size:12px;color:var(--text3)}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0}
  .status-dot.ok{background:var(--green);box-shadow:0 0 0 3px var(--green-bg)}
  .status-dot.err{background:var(--red)}
  label{display:block;font-size:11px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  input[type=text],select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:var(--sans);font-size:13px;padding:9px 12px;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
  input[type=text]:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim)}
  select{background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%235a5a72' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:30px}
  .field{margin-bottom:14px}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 16px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
  .btn:hover{border-color:var(--border2);color:var(--text);background:#2a2a33}
  .btn:active{transform:scale(.98)}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn-primary:hover{background:#6a59ee;border-color:#6a59ee;color:#fff}
  .btn-ghost{background:transparent;border-color:transparent;color:var(--text3);padding:6px 10px}
  .btn-ghost:hover{background:var(--surface2);color:var(--text2);border-color:transparent}
  .btn-danger{color:var(--red)}
  .btn-danger:hover{background:var(--red-bg);border-color:transparent}
  .btn-sm{padding:5px 10px;font-size:12px}
  .btn-full{width:100%}
  .btn-icon{padding:6px;width:30px;height:30px}
  .sidebar-section{padding:16px 20px;border-bottom:1px solid var(--border)}
  .section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
  .filter-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px;display:grid;grid-template-columns:1fr 1fr;gap:6px;position:relative}
  .filter-item select,.filter-item input{font-size:12px;padding:6px 10px}
  .filter-item .filter-val{grid-column:1/-1}
  .filter-item .filter-val.hidden{display:none}
  .filter-remove{position:absolute;top:6px;right:6px}
  .filter-logic{font-size:11px;color:var(--accent2);font-family:var(--mono);text-align:center;margin:4px 0}
  .main-header{padding:20px 28px;border-bottom:1px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .search-wrap{flex:1;min-width:200px;position:relative}
  .search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
  .search-input{padding-left:38px !important;font-size:14px !important}
  .results-area{flex:1;overflow:auto;padding:20px 28px}
  .stats-bar{display:flex;align-items:center;gap:16px;margin-bottom:16px;flex-wrap:wrap}
  .stat-pill{font-size:12px;color:var(--text3);font-family:var(--mono)}
  .stat-pill span{color:var(--text);font-weight:500}
  .table-container{border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;background:var(--surface)}
  .table-scroll{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13px}
  thead{background:var(--surface2)}
  th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
  th:hover{color:var(--text2)}
  th.sorted{color:var(--accent2)}
  td{padding:11px 16px;border-bottom:1px solid var(--border);color:var(--text2);max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr{transition:background .1s;cursor:pointer}
  tbody tr:hover td{background:var(--surface2);color:var(--text)}
  .id-link{color:var(--accent2);font-family:var(--mono);font-size:12px;font-weight:500;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:3px}
  .badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:11px;font-weight:500;font-family:var(--mono)}
  .badge-true{background:var(--green-bg);color:var(--green)}
  .badge-false{background:rgba(90,90,114,0.2);color:var(--text3)}
  .badge-num{background:var(--accent-dim);color:var(--accent2)}
  .empty-state{text-align:center;padding:60px 20px;color:var(--text3)}
  .empty-state .icon{font-size:40px;margin-bottom:12px;opacity:.4}
  .pagination{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--border);background:var(--surface);flex-wrap:wrap;gap:10px}
  .pag-info{font-size:12px;color:var(--text3);font-family:var(--mono)}
  .pag-btns{display:flex;gap:4px}
  .pag-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--mono);transition:all .15s}
  .pag-btn:hover:not(:disabled){border-color:var(--border2);color:var(--text)}
  .pag-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .pag-btn:disabled{opacity:.3;cursor:default}
  .error-banner{background:var(--red-bg);border:1px solid rgba(248,113,113,0.3);border-radius:var(--radius);padding:12px 16px;font-size:13px;color:var(--red);margin-bottom:16px;display:flex;align-items:flex-start;gap:8px}
  .loader{display:flex;align-items:center;gap:10px;color:var(--text3);font-size:13px;padding:40px 0;justify-content:center}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}
  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px)}
  .modal-overlay.open{display:flex}
  .modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-lg);width:100%;max-width:960px;max-height:92vh;overflow-y:auto;display:flex;flex-direction:column}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 24px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:1}
  .modal-title{font-size:16px;font-weight:600;letter-spacing:-.02em}
  .modal-id{font-size:12px;color:var(--text3);font-family:var(--mono);margin-top:2px}
  .modal-tabs{display:flex;gap:4px;padding:0 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:61px;z-index:1;flex-wrap:wrap}
  .tab-btn{padding:12px 20px;font-size:13px;font-weight:600;color:var(--text3);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-family:var(--sans);letter-spacing:.02em}
  .tab-btn:hover{color:var(--text2)}
  .tab-btn.active{color:var(--accent2);border-bottom-color:var(--accent)}
  .tab-panel{display:none;padding:24px}
  .tab-panel.active{display:block}
  /* FOTO */
  .photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .photo-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .photo-card img{width:100%;max-height:300px;object-fit:contain;background:#0a0a0d;display:block;cursor:zoom-in}
  .photo-label{padding:10px 14px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;justify-content:space-between}
  .photo-label a{color:var(--accent2);font-size:11px;text-decoration:none}
  /* Lightbox */
  .lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:500;align-items:center;justify-content:center;cursor:zoom-out}
  .lightbox.open{display:flex}
  .lightbox img{max-width:95vw;max-height:95vh;object-fit:contain;border-radius:var(--radius)}
  /* XML */
  .xml-section{margin-bottom:28px}
  .xml-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .xml-label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
  pre.xml-code{background:#0d0d10;border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-family:var(--mono);font-size:12px;line-height:1.7;overflow-x:auto;white-space:pre;color:var(--text2);max-height:420px;overflow-y:auto}
  .xml-tag{color:#7c6bff}.xml-attr{color:#a99bff}.xml-val{color:#4ade80}.xml-comment{color:#5a5a72;font-style:italic}
  /* CAMPI */
  .highlight-section{margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border)}
  .highlight-section-title{font-size:11px;font-weight:600;color:var(--accent2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
  .highlight-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:4px}
  .highlight-item{background:var(--accent-dim);border:1px solid rgba(124,107,255,0.2);border-radius:var(--radius);padding:10px 14px}
  .highlight-key{font-size:10px;font-weight:600;color:var(--accent2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
  .highlight-val{font-size:14px;color:var(--text);font-weight:500;word-break:break-word}
  .fields-section-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;margin-top:4px}
  .fields-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px}
  .field-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px}
  .field-key{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
  .field-val{font-size:13px;color:var(--text);word-break:break-word}
  .field-val.empty{color:var(--text3);font-style:italic}
  .no-media{color:var(--text3);font-size:13px;text-align:center;padding:40px 0}
  .no-media .icon{font-size:32px;margin-bottom:10px;opacity:.3}
  @media(max-width:700px){.sidebar{display:none}.main-header,.results-area{padding:14px 16px}.photo-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon" id="logo-icon">🗄️</div>
        <div>
          <div class="logo-text" id="logo-text">Archivio</div>
          <div class="logo-sub" id="logo-sub">Database</div>
        </div>
      </div>
      <div class="status-row">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">Connessione...</span>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="section-title">Ordinamento</div>
      <div class="field"><label>Colonna</label><select id="sort-col"><option value="">— Nessuno —</option></select></div>
      <div class="field"><label>Direzione</label>
        <select id="sort-dir">
          <option value="asc">↑ Crescente</option>
          <option value="desc">↓ Decrescente</option>
        </select>
      </div>
    </div>
    <div class="sidebar-section" style="flex:1">
      <div class="section-title">Filtri
        <button class="btn btn-ghost btn-sm" onclick="addFilter()" style="font-size:18px;padding:0 4px;line-height:1">+</button>
      </div>
      <div id="filter-list"></div>
      <div style="display:flex;gap:6px;margin-top:8px">
        <button class="btn btn-sm" onclick="clearFilters()" style="flex:1">Pulisci</button>
        <button class="btn btn-primary btn-sm" onclick="runSearch(1)" style="flex:1">Applica</button>
      </div>
    </div>
    <div class="sidebar-section">
      <div class="field"><label>Righe per pagina</label>
        <select id="page-size" onchange="runSearch(1)">
          <option value="10">10</option><option value="25" selected>25</option>
          <option value="50">50</option><option value="100">100</option>
        </select>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="main-header">
      <div class="search-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" class="search-input" id="quick-search" placeholder="Ricerca rapida..." oninput="debounceSearch()"/>
      </div>
      <button class="btn" onclick="exportCSV()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Esporta CSV
      </button>
      <button class="btn btn-primary" onclick="runSearch(1)">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Cerca
      </button>
    </div>
    <div class="results-area" id="results-area">
      <div class="loader"><div class="spin"></div>Connessione al database...</div>
    </div>
  </main>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="overlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div><div class="modal-title" id="modal-title">Dettaglio</div><div class="modal-id" id="modal-id"></div></div>
      <button class="btn btn-ghost btn-icon" onclick="closeModal()" style="font-size:18px;line-height:1">✕</button>
    </div>
    <div class="modal-tabs" id="modal-tabs"></div>
    <div id="tab-foto"  class="tab-panel"></div>
    <div id="tab-xml"   class="tab-panel"></div>
    <div id="tab-campi" class="tab-panel"></div>
  </div>
</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="Foto ingrandita"/>
</div>

<script>
let CFG = {
  projectName:"Archivio", projectEmoji:"🗄️", projectSub:"Database",
  highlightFields:[], fotoFields:[], xmlFields:[], hideFromTable:[]
};

let columns=[], currentPage=1, totalRows=0, sortedCol='', sortDir='asc', debTimer=null, allData=[];

async function apiFetch(params={}){
  const url=new URL('/api/records',window.location.origin);
  Object.entries(params).forEach(([k,v])=>{if(v!==undefined&&v!=='')url.searchParams.set(k,String(v));});
  const r=await fetch(url.toString());
  if(!r.ok){const t=await r.text();throw new Error(`${r.status}: ${t.slice(0,200)}`);}
  return r.json();
}

function norm(data){
  const list=data.list||data.records||[];
  const total=data.pageInfo?.totalRows??data.pageInfo?.totalRecords??list.length;
  return{list,total};
}

async function init(){
  try{
    const cfg=await fetch('/api/config').then(r=>r.json());
    Object.assign(CFG,cfg);
    document.getElementById('logo-icon').textContent=CFG.projectEmoji;
    document.getElementById('logo-text').textContent=CFG.projectName;
    document.getElementById('logo-sub').textContent=CFG.projectSub;
    document.title=CFG.projectName;
  }catch(e){}
  try{
    const data=await apiFetch({limit:1});
    const{list}=norm(data);
    if(list.length>0) columns=Object.keys(list[0]).filter(k=>!k.startsWith('nc_')&&k!=='Id'&&k!=='id');
    setStatus('ok','Connesso');
    populateSelects();
    addFilter();
    runSearch(1);
  }catch(e){
    setStatus('err','Errore: '+e.message.slice(0,50));
    showError(e.message);
  }
}

// ── Filters ────────────────────────────────────────────
let fc=0;
const OPS=[['eq','= uguale'],['neq','≠ diverso'],['like','∋ contiene'],['nlike','∌ non contiene'],['gt','> maggiore'],['lt','< minore'],['gte','≥'],['lte','≤'],['empty','∅ vuoto'],['notempty','≠∅ non vuoto']];

function addFilter(){
  const id=++fc,list=document.getElementById('filter-list');
  if(list.children.length>0){const l=document.createElement('div');l.className='filter-logic';l.textContent='AND';l.id='logic-'+id;list.appendChild(l);}
  const div=document.createElement('div');div.className='filter-item';div.id='fi-'+id;
  const co=columns.length?columns.map(c=>`<option value="${c}">${c}</option>`).join(''):'<option>—</option>';
  const oo=OPS.map(([v,l])=>`<option value="${v}">${l}</option>`).join('');
  div.innerHTML=`<select onchange="foc(${id})">${co}</select><select id="fop-${id}" onchange="foc(${id})">${oo}</select><input type="text" id="fval-${id}" class="filter-val" placeholder="valore..."/><button class="btn btn-ghost btn-icon filter-remove btn-danger" onclick="rmf(${id})">✕</button>`;
  list.appendChild(div);
}
function foc(id){const op=document.getElementById('fop-'+id).value;const el=document.getElementById('fval-'+id);if(el)el.classList.toggle('hidden',['empty','notempty'].includes(op));}
function rmf(id){document.getElementById('fi-'+id)?.remove();document.getElementById('logic-'+id)?.remove();}
function clearFilters(){document.getElementById('filter-list').innerHTML='';fc=0;}
function buildWhere(){
  const p=[];
  document.querySelectorAll('.filter-item').forEach(r=>{
    const s=r.querySelectorAll('select'),i=r.querySelector('input.filter-val');
    if(!s[0]||!s[1])return;
    const c=s[0].value,o=s[1].value,v=i?i.value:'';
    if(!c)return;
    if(['empty','notempty'].includes(o))p.push(`(${c},${o})`);
    else if(v!=='')p.push(`(${c},${o},${v})`);
  });
  return p.join('~and');
}

function debounceSearch(){clearTimeout(debTimer);debTimer=setTimeout(()=>runSearch(1),350);}

async function runSearch(page=1){
  currentPage=page;showLoading();
  const where=buildWhere(),q=document.getElementById('quick-search').value.trim();
  const sc=document.getElementById('sort-col').value,sd=document.getElementById('sort-dir').value;
  const ps=parseInt(document.getElementById('page-size').value);
  const params={limit:ps,offset:(page-1)*ps};
  let wc=where;
  if(q&&columns.length){const qp=columns.slice(0,6).map(c=>`(${c},like,%${q}%)`).join('~or');wc=where?`(${where})~and(${qp})`:qp;}
  if(wc)params.where=wc;
  if(sc)params.sort=(sd==='desc'?'-':'')+sc;
  try{
    const data=await apiFetch(params);
    const{list,total}=norm(data);
    totalRows=total;allData=list;
    if(allData.length>0&&columns.length===0){columns=Object.keys(allData[0]).filter(k=>!k.startsWith('nc_')&&k!=='Id'&&k!=='id');populateSelects();}
    renderResults(allData,total);
  }catch(e){showError(e.message);}
}

function renderResults(rows,total){
  const area=document.getElementById('results-area');
  const ps=parseInt(document.getElementById('page-size').value);
  const pages=Math.ceil(total/ps);
  if(!rows.length){area.innerHTML=`<div class="empty-state"><div class="icon">🔍</div><p>Nessun risultato</p></div>`;return;}
  const hidden=new Set(CFG.hideFromTable);
  const cols=(columns.length?columns:Object.keys(rows[0]).filter(k=>!k.startsWith('nc_'))).filter(k=>!hidden.has(k));
  const thead=`<thead><tr>${cols.map(c=>`<th onclick="sortBy('${c}')" class="${sortedCol===c?'sorted':''}">${c}${sortedCol===c?(sortDir==='asc'?' ↑':' ↓'):''}</th>`).join('')}</tr></thead>`;
  const tbody='<tbody>'+rows.map((row,i)=>{
    const cells=cols.map(col=>{
      const v=row[col],raw=String(v??'');
      if(v===null||v===undefined||v==='')return`<td style="color:var(--text3)">—</td>`;
      if(typeof v==='boolean')return`<td><span class="badge badge-${v}">${v?'Sì':'No'}</span></td>`;
      if(typeof v==='number')return`<td><span class="badge badge-num">${v.toLocaleString('it-IT')}</span></td>`;
      if(typeof v==='object')return`<td><span style="color:var(--text3);font-family:var(--mono);font-size:11px">—</span></td>`;
      if(col===cols[0])return`<td><span class="id-link">${raw}</span></td>`;
      const d=raw.length>40?raw.slice(0,40)+'…':raw;
      return`<td title="${raw.replace(/"/g,'&quot;')}">${d}</td>`;
    }).join('');
    return`<tr onclick="openDetail(${i})">${cells}</tr>`;
  }).join('')+'</tbody>';
  let pag='';
  if(pages>1){
    let b=`<button class="pag-btn" onclick="runSearch(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹</button>`;
    for(let i=1;i<=pages;i++){
      if(i===1||i===pages||Math.abs(i-currentPage)<=1)b+=`<button class="pag-btn ${i===currentPage?'active':''}" onclick="runSearch(${i})">${i}</button>`;
      else if(Math.abs(i-currentPage)===2)b+=`<span style="color:var(--text3);padding:0 4px;line-height:32px">…</span>`;
    }
    b+=`<button class="pag-btn" onclick="runSearch(${currentPage+1})" ${currentPage>=pages?'disabled':''}>›</button>`;
    const from=(currentPage-1)*ps+1,to=Math.min(currentPage*ps,total);
    pag=`<div class="pagination"><span class="pag-info">Riga ${from}–${to} di ${total.toLocaleString('it-IT')}</span><div class="pag-btns">${b}</div></div>`;
  }
  area.innerHTML=`
    <div class="stats-bar">
      <div class="stat-pill">Risultati: <span>${total.toLocaleString('it-IT')}</span></div>
      <div class="stat-pill">Pagina: <span>${currentPage} / ${pages||1}</span></div>
      <div style="margin-left:auto;font-size:11px;color:var(--text3)">Clicca una riga per i dettagli</div>
    </div>
    <div class="table-container"><div class="table-scroll"><table>${thead}${tbody}</table></div>${pag}</div>`;
}

function sortBy(col){
  if(sortedCol===col)sortDir=sortDir==='asc'?'desc':'asc';
  else{sortedCol=col;sortDir='asc';}
  document.getElementById('sort-col').value=col;
  document.getElementById('sort-dir').value=sortDir;
  runSearch(currentPage);
}

function exportCSV(){
  if(!allData.length){alert('Nessun dato.');return;}
  const hidden=new Set(CFG.hideFromTable);
  const cols=(columns.length?columns:Object.keys(allData[0]).filter(k=>!k.startsWith('nc_'))).filter(k=>!hidden.has(k));
  const csv=[cols.join(','),...allData.map(r=>cols.map(c=>`"${String(r[c]??'').replace(/"/g,'""')}"`).join(','))].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download='export.csv';a.click();
}

// ── Modal ──────────────────────────────────────────────
function openDetail(i){
  const row=allData[i];if(!row)return;
  const hidden=new Set(CFG.hideFromTable);
  const firstVisible=columns.find(k=>!hidden.has(k))||columns[0]||'';
  const id=row['IDENTIFICATORE']||row[firstVisible]||row['Id']||'';
  const titleField=CFG.highlightFields[0]||firstVisible;
  document.getElementById('modal-title').textContent=row[titleField]||id;
  document.getElementById('modal-id').textContent=id?`ID: ${id}`:'';

  // Tre tab fisse: FOTO / MODS·PREMIS / CAMPI
  document.getElementById('modal-tabs').innerHTML=`
    <button class="tab-btn active" onclick="switchTab('foto')">📷 Foto</button>
    <button class="tab-btn" onclick="switchTab('xml')">📄 MODS / PREMIS</button>
    <button class="tab-btn" onclick="switchTab('campi')">📋 Campi</button>
  `;

  // ── Tab FOTO ──
  const fotoCards = CFG.fotoFields.map(field=>{
    const att=parseAtt(row[field]);
    if(!att.length)return'';
    const u=resolveUrl(att[0]);
    const label=field.replace(/_/g,' ');
    return`<div class="photo-card">
      <img src="${u}" alt="${label}" loading="lazy" onclick="openLightbox('${u}')" onerror="this.parentElement.style.display='none'">
      <div class="photo-label">${label}<a href="${u}" download target="_blank">↓ scarica</a></div>
    </div>`;
  }).filter(Boolean).join('');
  document.getElementById('tab-foto').innerHTML = fotoCards
    ? `<div class="photo-grid">${fotoCards}</div>`
    : `<div class="no-media"><div class="icon">📷</div><p>Nessuna foto caricata per questo elemento</p></div>`;

  // ── Tab XML (MODS / PREMIS) ──
  const xmlHTML = CFG.xmlFields.map(field=>{
    const content=row[field]||'';
    if(!content)return'';
    return buildXmlSection(field.replace(/_/g,' '),content);
  }).filter(Boolean).join('');
  document.getElementById('tab-xml').innerHTML = xmlHTML
    || `<div class="no-media"><div class="icon">📄</div><p>Nessun file XML caricato per questo elemento</p></div>`;

  // ── Tab CAMPI ──
  // Sezione highlight (campi in evidenza)
  const highlightSet = new Set(CFG.highlightFields);
  const excludeFromAll = new Set([...CFG.hideFromTable,'Id','id','ncRecordId']);

  let campiHTML = '';

  if(CFG.highlightFields.length){
    const hItems = CFG.highlightFields
      .filter(f=>row[f]!==undefined&&row[f]!==null&&row[f]!=='')
      .map(f=>`<div class="highlight-item">
        <div class="highlight-key">${f}</div>
        <div class="highlight-val">${row[f]}</div>
      </div>`).join('');
    if(hItems){
      campiHTML += `<div class="highlight-section">
        <div class="highlight-section-title">⭐ Campi principali</div>
        <div class="highlight-grid">${hItems}</div>
      </div>`;
    }
  }

  // Tutti gli altri campi (esclusi highlight, foto, xml, tecnici)
  const otherItems = Object.entries(row)
    .filter(([k])=>!excludeFromAll.has(k)&&!k.startsWith('nc_')&&!highlightSet.has(k))
    .map(([k,v])=>{
      const d=(v===null||v===undefined||v==='')?'':typeof v==='object'?JSON.stringify(v):String(v);
      return`<div class="field-item">
        <div class="field-key">${k}</div>
        <div class="field-val ${!d?'empty':''}">${d||'—'}</div>
      </div>`;
    }).join('');

  if(otherItems){
    campiHTML += `<div class="fields-section-title">Tutti i campi</div>
      <div class="fields-grid">${otherItems}</div>`;
  }

  document.getElementById('tab-campi').innerHTML = campiHTML || `<div class="no-media"><div class="icon">📋</div><p>Nessun campo disponibile</p></div>`;

  switchTab('foto');
  document.getElementById('modal-overlay').classList.add('open');
}

function buildXmlSection(label,xml){
  const h=hxml(xml.trim());
  const dl=URL.createObjectURL(new Blob([xml],{type:'application/xml'}));
  return`<div class="xml-section">
    <div class="xml-toolbar">
      <span class="xml-label">${label}</span>
      <a href="${dl}" download="${label.toLowerCase().replace(/ /g,'_')}.xml" class="btn btn-sm">↓ Scarica XML</a>
    </div>
    <pre class="xml-code">${h}</pre>
  </div>`;
}

function hxml(x){
  return x.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(&lt;\?[^?]*\?&gt;)/g,'<span class="xml-comment">$1</span>')
    .replace(/(&lt;!--[\s\S]*?--&gt;)/g,'<span class="xml-comment">$1</span>')
    .replace(/(&lt;\/?)([\w:.-]+)/g,'<span class="xml-tag">$1$2</span>')
    .replace(/([\w:.-]+)=(&quot;)(.*?)(\2)/g,'<span class="xml-attr">$1</span>=<span class="xml-val">&quot;$3&quot;</span>');
}

function parseAtt(val){if(!val)return[];if(typeof val==='string'){try{val=JSON.parse(val);}catch{return[];}}return Array.isArray(val)?val:[];}
function resolveUrl(a){if(!a)return'';if(a.signedUrl)return a.signedUrl;if(a.url)return a.url;if(a.path)return a.path.startsWith('http')?a.path:`https://app.nocodb.com/${a.path}`;return'';}

function switchTab(n){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.onclick.toString().includes(`'${n}'`)));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  const el=document.getElementById('tab-'+n);if(el)el.classList.add('active');
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function overlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}
function openLightbox(u){document.getElementById('lightbox-img').src=u;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
function populateSelects(){
  const s=document.getElementById('sort-col');
  s.innerHTML='<option value="">— Nessuno —</option>'+columns.map(c=>`<option value="${c}">${c}</option>`).join('');
  document.querySelectorAll('.filter-item select:first-child').forEach(sel=>{
    const cur=sel.value;sel.innerHTML=columns.map(c=>`<option value="${c}"${c===cur?' selected':''}>${c}</option>`).join('');
  });
}
function showLoading(){document.getElementById('results-area').innerHTML=`<div class="loader"><div class="spin"></div>Caricamento...</div>`;}
function showError(msg){document.getElementById('results-area').innerHTML=`<div class="error-banner"><span>⚠</span><div><strong>Errore</strong><br><span style="font-family:var(--mono);font-size:12px">${msg}</span></div></div>`;}
function setStatus(s,msg){document.getElementById('status-dot').className='status-dot '+(s==='ok'?'ok':'err');document.getElementById('status-text').textContent=msg;}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closeLightbox();}});

init();
</script>
</body>
</html>
